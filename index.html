<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Israel Residential Deal Heatmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="brand">
          <h1 id="title">Residential deals</h1>
          <div class="meta" id="meta">Loading…</div>
        </div>
        <div class="controls">
          <div class="group" role="tablist" aria-label="City">
            <label>City</label>
            <button type="button" data-city="herzliya" class="active">Herzliya</button>
            <button type="button" data-city="haifa">Haifa</button>
            <button type="button" data-city="beer-sheva">Beer Sheva</button>
          </div>
          <div class="group" role="tablist" aria-label="Score metric">
            <label>Score</label>
            <button type="button" data-metric="perSqm" class="active">₪ / m²</button>
            <button type="button" data-metric="total">Total ₪</button>
          </div>
          <div class="group" role="tablist" aria-label="Map view">
            <label>View</label>
            <button type="button" data-mode="dots" class="active">Dots</button>
            <button type="button" data-mode="heat">Heat</button>
          </div>
          <div class="legend" title="Year-normalized percentile within each calendar year">
            <span>Cheap</span>
            <div class="legend-bar" aria-hidden="true"></div>
            <span>Expensive</span>
          </div>
        </div>
      </header>
      <div id="map"></div>
      <div id="status" class="status" hidden></div>
    </div>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
